# Cloud Build config for deploying to Cloud Run
# Trigger: push to main branch or manual
#
# Usage:
#   cd backend && gcloud builds submit --config=cloudbuild.yaml .
#
# Prerequisites:
#   - Artifact Registry repo "retailsg" exists
#   - Service account retailsg-api@ has roles/firebase.admin (uses ADC, no key needed)

substitutions:
  _REGION: asia-southeast1
  _SERVICE_NAME: retailsg-api

steps:
  # Build container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}:${BUILD_ID}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}:latest"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}"

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}:${BUILD_ID}"
      - "--region=${_REGION}"
      - "--platform=managed"
      # TODO: Replace with --no-allow-unauthenticated + API Gateway/Load Balancer
      # for Firebase token validation at the edge. Kept public for now because the
      # iOS app hits Cloud Run directly and all endpoints enforce Firebase auth.
      - "--allow-unauthenticated"
      - "--port=8000"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-env-vars=ENVIRONMENT=production"
      - "--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID}"
      - "--set-env-vars=FIREBASE_PROJECT_ID=${PROJECT_ID}"
      - "--set-env-vars=^@^CORS_ORIGINS=[\"http://localhost:5173\",\"https://${PROJECT_ID}.web.app\",\"https://${PROJECT_ID}.firebaseapp.com\"]"
      - "--set-env-vars=AI_GCS_BUCKET=${PROJECT_ID}-ai-artifacts"
      - "--service-account=retailsg-api@${PROJECT_ID}.iam.gserviceaccount.com"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}:${BUILD_ID}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
