# Cloud Build config for deploying to Cloud Run
# Trigger: push to main branch or manual
#
# Usage:
#   cd backend && gcloud builds submit --config=cloudbuild.yaml .
#
# Prerequisites:
#   - Cloud SQL instance "retailsg" exists
#   - Secret "retailsg-db-url" stored in Secret Manager
#   - Artifact Registry repo "retailsg" exists
#   - Service account retailsg-api@ has roles/firebase.admin (uses ADC, no key needed)

substitutions:
  _REGION: asia-southeast1
  _SERVICE_NAME: retailsg-api
  _CLOUD_SQL_INSTANCE: "project-b41c0c0d-6eea-4e9d-a78:${_REGION}:retailsg"

steps:
  # Build container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}:latest"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}"

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8000"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}"
      - "--set-env-vars=ENVIRONMENT=production"
      - "--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID}"
      - "--set-env-vars=FIREBASE_PROJECT_ID=${PROJECT_ID}"
      - "--set-secrets=DATABASE_URL=retailsg-db-url:latest"
      - "--service-account=retailsg-api@${PROJECT_ID}.iam.gserviceaccount.com"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/retailsg/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
